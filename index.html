<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>AthleteOS V1</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">AthleteOS V1</p>
        <h1 id="todayTitle">Today</h1>
      </div>
      <button id="resetDayBtn" class="ghost">Reset Day</button>
    </header>

    <section class="card hero">
      <div>
        <p class="label">Daily Completion</p>
        <h2><span id="doneCount">0</span>/<span id="totalCount">0</span></h2>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
    </section>

    <section class="tabs">
      <button class="tab active" data-tab="training">Training</button>
      <button class="tab" data-tab="nutrition">Nutrition</button>
      <button class="tab" data-tab="recovery">Recovery</button>
      <button class="tab" data-tab="notes">Notes</button>
    </section>

    <section id="training" class="panel active">
      <div class="card">
        <h3 id="trainingDayTitle">Workout</h3>
        <div id="checklist"></div>
      </div>
      <div class="card compact">
        <h3>Week Plan</h3>
        <select id="daySelect"></select>
      </div>
    </section>

    <section id="nutrition" class="panel">
      <div class="card">
        <h3>Macros</h3>
        <div class="macro-grid">
          <label>Protein <input id="protein" type="number" inputmode="numeric" /></label>
          <label>Carbs <input id="carbs" type="number" inputmode="numeric" /></label>
          <label>Fat <input id="fat" type="number" inputmode="numeric" /></label>
          <label>Calories <input id="calories" type="number" inputmode="numeric" /></label>
        </div>
        <p id="macroTarget" class="hint"></p>
      </div>
    </section>

    <section id="recovery" class="panel">
      <div class="card">
        <h3>Recovery</h3>
        <div class="macro-grid">
          <label>Sleep hrs <input id="sleep" type="number" step="0.1" inputmode="decimal" /></label>
          <label>WHOOP % <input id="whoop" type="number" inputmode="numeric" /></label>
          <label>Weight <input id="weight" type="number" step="0.1" inputmode="decimal" /></label>
          <label>Soreness 1-10 <input id="soreness" type="number" min="1" max="10" inputmode="numeric" /></label>
        </div>
        <p id="recoveryAdvice" class="hint"></p>
      </div>
    </section>

    <section id="notes" class="panel">
      <div class="card">
        <h3>Baseball / Training Notes</h3>
        <textarea id="notesBox" placeholder="How did you feel? Throws? Sprint times? Anything to adjust?"></textarea>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
